name: 批量迁移镜像到DockerHub
on:
  workflow_dispatch: # 手动一键执行批量任务

jobs:
  parse-list:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read_list.outputs.matrix }}
    steps:
      - name: 检出当前仓库（读取迁移清单）
        uses: actions/checkout@v4

      - name: 读取镜像列表生成矩阵
        id: read_list
        run: |
          # 将json转为action matrix格式
          matrix=$(jq -c '{migrate: .}' migrate-list.json)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  batch-migrate:
    needs: parse-list
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # 单镜像失败不终止整个批量任务
      matrix: ${{ fromJson(needs.parse-list.outputs.matrix) }}
    uses: ./.github/workflows/build.yml
    with:
      # 源仓库固定为本仓库，存放自定义迁移Dockerfile
      source_repo: ${{ github.repository }}
      # DockerHub镜像后缀名称
      docker_image_name: ${{ matrix.migrate.hub_name }}
      use_custom_dockerfile: true
      custom_dockerfile_path: dockerfiles/migrate-template.Dockerfile
      # 传递构建参数 SRC_IMG，不需要复制文件
      additional_files_to_copy: '[{"build_arg":"SRC_IMG=${{ matrix.migrate.source_img }}"}]'
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
